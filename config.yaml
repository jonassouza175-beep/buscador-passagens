# ============================================================
# Configuração do buscador de passagens
# Edite os valores abaixo conforme sua preferência.
# ============================================================

origem:
  # Galeão (voos internacionais e boa parte dos domésticos) e Santos Dumont
  aeroportos: ["GIG", "SDU"]

# Capitais de todos os estados brasileiros (código IATA do aeroporto principal)
destinos_brasil:
  AC: "RBR"   # Rio Branco
  AL: "MCZ"   # Maceió
  AP: "MCP"   # Macapá
  AM: "MAO"   # Manaus
  BA: "SSA"   # Salvador
  CE: "FOR"   # Fortaleza
  DF: "BSB"   # Brasília
  ES: "VIX"   # Vitória
  GO: "GYN"   # Goiânia
  MA: "SLZ"   # São Luís
  MT: "CGB"   # Cuiabá
  MS: "CGR"   # Campo Grande
  MG: "CNF"   # Belo Horizonte (Confins)
  PA: "BEL"   # Belém
  PB: "JPA"   # João Pessoa
  PR: "CWB"   # Curitiba
  PE: "REC"   # Recife
  PI: "THE"   # Teresina
  RN: "NAT"   # Natal
  RS: "POA"   # Porto Alegre
  RO: "PVH"   # Porto Velho
  RR: "BVB"   # Boa Vista
  SC: "FLN"   # Florianópolis
  SP: "GRU"   # São Paulo
  SE: "AJU"   # Aracaju
  TO: "PMW"   # Palmas

# Principais hubs europeus a partir do Rio (GIG costuma ter voo direto ou 1 conexão)
destinos_europa:
  # Europa Ocidental
  Portugal_Lisboa: "LIS"
  Espanha_Madri: "MAD"
  Espanha_Barcelona: "BCN"
  Franca_Paris: "CDG"
  Italia_Roma: "FCO"
  Italia_Milao: "MXP"
  ReinoUnido_Londres: "LHR"
  Holanda_Amsterda: "AMS"
  Alemanha_Frankfurt: "FRA"
  Alemanha_Munique: "MUC"
  Belgica_Bruxelas: "BRU"
  Suica_Zurique: "ZRH"
  Austria_Viena: "VIE"
  Irlanda_Dublin: "DUB"
  Luxemburgo: "LUX"

  # Europa do Norte
  Dinamarca_Copenhague: "CPH"
  Suecia_Estocolmo: "ARN"
  Noruega_Oslo: "OSL"
  Finlandia_Helsinque: "HEL"
  Islandia_Reykjavik: "KEF"

  # Europa Central e do Leste
  Polonia_Varsovia: "WAW"
  RepublicaTcheca_Praga: "PRG"
  Hungria_Budapeste: "BUD"
  Eslovaquia_Bratislava: "BTS"
  Eslovenia_Liubliana: "LJU"
  Estonia_Talin: "TLL"
  Letonia_Riga: "RIX"
  Lituania_Vilnius: "VNO"

  # Europa Meridional / Balcãs
  Grecia_Atenas: "ATH"
  Croacia_Zagreb: "ZAG"
  Romenia_Bucareste: "OTP"
  Bulgaria_Sofia: "SOF"
  Servia_Belgrado: "BEG"
  Malta: "MLA"
  Chipre_Larnaca: "LCA"
  BosniaHerzegovina_Sarajevo: "SJJ"
  Albania_Tirana: "TIA"
  MacedoniaDoNorte_Skopje: "SKP"
  Montenegro_Podgorica: "TGD"
  Moldavia_Chisinau: "KIV"
  Turquia_Istambul: "IST"

busca:
  moeda: "brl"
  # Quantos "grupos" de destino existem (um por dia da semana).
  # O script processa 1 grupo por execução, girando os 7 dias,
  # assim TODOS os destinos são cobertos ao longo da semana.
  grupos_por_semana: 7
  # Quantos preços recentes de cada destino ficam guardados pra
  # calcular a média histórica usada nos alertas.
  tamanho_historico_media: 20

alertas:
  queda_percentual_minima: 10      # avisa se o preço caiu X% ou mais vs. a média histórica
  preco_maximo_brasil: 900         # também avisa se ficar abaixo desse valor (R$)
  preco_maximo_europa: 3500        # também avisa se ficar abaixo desse valor (R$)
  sempre_enviar_resumo: false      # true = recebe e-mail todo dia; false = só quando há alerta
