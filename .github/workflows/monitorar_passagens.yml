name: Monitorar Passagens

on:
  schedule:
    - cron: "0 11 * * *"   # 08:00 (horário de Brasília, UTC-3) todos os dias
  workflow_dispatch: {}      # permite rodar manualmente pela aba Actions

permissions:
  contents: write

jobs:
  buscar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar buscador de passagens
        env:
          AMADEUS_CLIENT_ID: ${{ secrets.AMADEUS_CLIENT_ID }}
          AMADEUS_CLIENT_SECRET: ${{ secrets.AMADEUS_CLIENT_SECRET }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_SERVER: smtp.gmail.com
          SMTP_PORT: 587
        run: python buscar_passagem.py

      - name: Salvar histórico de preços atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add price_history.json
          git diff --staged --quiet || git commit -m "Atualiza histórico de preços"
          git push
