name: Monitorar Passagens

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  buscar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar buscador de passagens
        env:
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_SERVER: smtp.gmail.com
          SMTP_PORT: 587
        run: python buscar_passagem.py

      - name: Salvar histórico de preços atualizado
        run: git config user.name "github-actions[bot]" && git config user.email "github-actions[bot]@users.noreply.github.com" && git add price_history.json && (git diff --staged --quiet || git commit -m "Atualiza historico de precos") && git push
